<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DDSL League Tables</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap');

  :root {
    --green: #1a6b3c;
    --green-light: #22883f;
    --green-dark: #0f3f22;
    --grass: #2d9e54;
    --gold: #f5c518;
    --gold-light: #ffe27a;
    --white: #fff;
    --off-white: #f4f6f2;
    --gray: #8a9a8e;
    --dark: #111a14;
    --shadow: 0 2px 12px rgba(0,0,0,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--green-dark);
    color: var(--dark);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--green-dark);
    padding: 20px 32px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 3px solid var(--gold);
  }
  .badge {
    width: 52px;
    height: 52px;
    background: var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 13px;
    color: var(--green-dark);
    line-height: 1.1;
    text-align: center;
    flex-shrink: 0;
  }
  header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 28px;
    color: var(--white);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  header h1 span {
    color: var(--gold);
  }
  header p {
    font-size: 13px;
    color: var(--gray);
    margin-top: 2px;
  }

  /* MAIN LAYOUT */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 28px 24px;
  }

  /* SELECTOR PANEL */
  .selector-panel {
    background: var(--white);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
  }
  .selector-panel h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--green-dark);
    margin-bottom: 14px;
  }
  .division-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    margin-bottom: 16px;
  }
  .div-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border: 2px solid #d0dbd4;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.18s;
    user-select: none;
    background: var(--off-white);
  }
  .div-toggle:hover {
    border-color: var(--green-light);
    background: #e8f5ec;
  }
  .div-toggle.active {
    border-color: var(--green);
    background: #d4edda;
  }
  .div-toggle input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--green);
    cursor: pointer;
    flex-shrink: 0;
  }
  .div-toggle .div-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--green-dark);
  }
  .div-toggle .div-sub {
    font-size: 11px;
    color: var(--gray);
  }

  .action-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 9px 20px;
    border-radius: 7px;
    border: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .btn-primary {
    background: var(--green);
    color: var(--white);
  }
  .btn-primary:hover { background: var(--green-light); }
  .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
  .btn-outline {
    background: transparent;
    color: var(--green-dark);
    border: 2px solid var(--green-dark);
  }
  .btn-outline:hover { background: var(--off-white); }
  .btn-gold {
    background: var(--gold);
    color: var(--green-dark);
  }
  .btn-gold:hover { background: var(--gold-light); }
  .btn-gold:disabled { background: #ccc; cursor: not-allowed; color: #888; }

  .sel-count {
    font-size: 13px;
    color: var(--gray);
    font-style: italic;
  }

  /* TABLES AREA */
  .tables-area { display: flex; flex-direction: column; gap: 24px; }

  .league-card {
    background: var(--white);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .league-card-header {
    background: var(--green-dark);
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .league-card-header h3 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 22px;
    color: var(--white);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .league-card-header a {
    font-size: 12px;
    color: var(--gold);
    text-decoration: none;
    opacity: 0.85;
  }
  .league-card-header a:hover { opacity: 1; text-decoration: underline; }

  .table-wrap {
    overflow-x: auto;
  }
  table.league-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  table.league-table thead tr {
    background: var(--off-white);
    border-bottom: 2px solid #d0dbd4;
  }
  table.league-table thead th {
    padding: 10px 14px;
    text-align: left;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--green-dark);
    white-space: nowrap;
  }
  table.league-table thead th.num { text-align: center; }
  table.league-table tbody tr {
    border-bottom: 1px solid #e8f0ea;
    transition: background 0.1s;
  }
  table.league-table tbody tr:hover { background: #f0f8f2; }
  table.league-table tbody tr.top-pos { background: #e8f8ee; }
  table.league-table tbody tr.top-pos:hover { background: #d8f3e4; }

  table.league-table td {
    padding: 9px 14px;
    color: var(--dark);
    white-space: nowrap;
  }
  table.league-table td.num { text-align: center; }
  table.league-table td.pos {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: var(--green-dark);
    width: 40px;
  }
  table.league-table td.pos.gold { color: #b5900a; }
  table.league-table td.pos.silver { color: #7a7a7a; }
  table.league-table td.pos.bronze { color: #8b5e3c; }

  table.league-table td.team-name {
    font-weight: 600;
    min-width: 200px;
  }
  table.league-table td.pts {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--green-dark);
    text-align: center;
  }

  .form-badges {
    display: flex;
    gap: 3px;
  }
  .form-badge {
    width: 20px;
    height: 20px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-family: 'Barlow Condensed', sans-serif;
  }
  .form-badge.W { background: #22883f; }
  .form-badge.D { background: #e8a000; }
  .form-badge.L { background: #c0392b; }

  /* LOADING / EMPTY */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #aaa;
    background: var(--white);
    border-radius: 12px;
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 14px; }
  .empty-state h3 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--gray);
    margin-bottom: 6px;
  }
  .empty-state p { font-size: 14px; }

  .loading-card {
    background: var(--white);
    border-radius: 12px;
    padding: 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: var(--shadow);
  }
  .spinner {
    width: 28px;
    height: 28px;
    border: 3px solid #d0dbd4;
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .last-updated {
    font-size: 11px;
    color: var(--gray);
    margin-top: 6px;
    padding: 0 20px 12px;
    text-align: right;
  }
</style>
</head>

<header>

      <button class="btn btn-gold" id="exportBtn" onclick="exportCSV()" disabled>Export CSV</button>

  <!-- TABLES AREA -->

      <h3>Select divisions above</h3>

  </div>

</div>

// ── State ──────────────────────────────────────────────────────────────────────
let selected = new Set();
let loaded = new Set();

// ── Init ───────────────────────────────────────────────────────────────────────
function init() {
  const grid = document.getElementById('divisionGrid');
  LEAGUES.forEach(lg => {
    const label = document.createElement('label');
    label.className = 'div-toggle';
    label.dataset.id = lg.id;
    label.innerHTML = `
      <input type="checkbox" value="${lg.id}" onchange="toggleDivision('${lg.id}', this)">
      <div>
        <div class="div-name">${lg.name}</div>
        <div class="div-sub">ddsl.ie/league/${lg.url.match(/\d+/)[0]}</div>
      </div>
    `;
    grid.appendChild(label);
  });
  updateCount();
}

function toggleDivision(id, cb) {
  if (cb.checked) selected.add(id);
  else selected.delete(id);
  cb.closest('.div-toggle').classList.toggle('active', cb.checked);
  updateCount();
}

function selectAll() {
  document.querySelectorAll('.div-toggle input').forEach(cb => {
    cb.checked = true;
    cb.closest('.div-toggle').classList.add('active');
    selected.add(cb.value);
  });
  updateCount();
}

function selectNone() {
  document.querySelectorAll('.div-toggle input').forEach(cb => {
    cb.checked = false;
    cb.closest('.div-toggle').classList.remove('active');
  });
  selected.clear();
  updateCount();
}

function updateCount() {
  document.getElementById('selCount').textContent =
    `${selected.size} division${selected.size !== 1 ? 's' : ''} selected`;
}

// ── Load / Render ──────────────────────────────────────────────────────────────
function loadSelected() {
  if (selected.size === 0) {
    alert('Please select at least one division.');
    return;
  }
  const area = document.getElementById('tablesArea');
  area.innerHTML = '';
  loaded.clear();

  const order = LEAGUES.filter(lg => selected.has(lg.id));
  order.forEach(lg => {
    area.appendChild(renderLeagueCard(lg));
    loaded.add(lg.id);
  });

  document.getElementById('exportBtn').disabled = loaded.size === 0;
}

function renderLeagueCard(lg) {
  const card = document.createElement('div');
  card.className = 'league-card';
  card.id = 'card-' + lg.id;

  card.innerHTML = `
    <div class="league-card-header">
      <h3>${lg.name}</h3>
      <a href="${lg.url}" target="_blank">View on ddsl.ie ↗</a>
    </div>
    <div class="table-wrap">
      <table class="league-table">
        <thead>
          <tr>
            <th class="num">#</th>
            <th>Team</th>
            <th class="num">Pld</th>
            <th class="num">W</th>
            <th class="num">D</th>
            <th class="num">L</th>
            <th class="num">Pts</th>
            <th>Form</th>
          </tr>
        </thead>
        <tbody>
          ${lg.teams.map(t => renderRow(t)).join('')}
        </tbody>
      </table>
    </div>
    <div class="last-updated">Last fetched: ${lg.updated}</div>
  `;
  return card;
}

function renderRow(t) {
  const posClass = t.pos === 1 ? 'gold' : t.pos === 2 ? 'silver' : t.pos === 3 ? 'bronze' : '';
  const topRow = t.pos === 1 ? 'top-pos' : '';
  const formBadges = t.form.split('').map(c =>
    `<div class="form-badge ${c}">${c}</div>`
  ).join('');

  return `
    <tr class="${topRow}">
      <td class="pos ${posClass}">${t.pos}</td>
      <td class="team-name">${t.team}</td>
      <td class="num">${t.pld}</td>
      <td class="num">${t.w}</td>
      <td class="num">${t.d}</td>
      <td class="num">${t.l}</td>
      <td class="pts">${t.pts}</td>
      <td><div class="form-badges">${formBadges}</div></td>
    </tr>
  `;
}

// ── CSV Export ─────────────────────────────────────────────────────────────────
function exportCSV() {
  if (loaded.size === 0) return;

  const rows = [['Division','Position','Team','Played','Won','Drawn','Lost','Points','Form']];
  LEAGUES.filter(lg => loaded.has(lg.id)).forEach(lg => {
    lg.teams.forEach(t => {
      rows.push([lg.name, t.pos, t.team, t.pld, t.w, t.d, t.l, t.pts, t.form]);
    });
    rows.push([]); // blank separator
  });

  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `DDSL_League_Tables_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

init();
</script>
</body>
</html>
